<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List Inversiones</title>
<style>
@font-face{font-family:'Everett';src:url('fonts/TWKEverett-Regular.ttf') format('truetype');font-weight:400}
@font-face{font-family:'Everett';src:url('fonts/TWKEverett-Medium.ttf') format('truetype');font-weight:500}
@font-face{font-family:'Everett';src:url('fonts/TWKEverett-Bold.ttf') format('truetype');font-weight:700}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f0f5f4;--surface:#FFFFFF;--text:#003342;--text-s:#314652;--text-h:#5f7079;
--border:#9eb5be;--border-l:#d2eaff;
--accent:#003342;--accent-l:#d2eaff;--accent-d:#002129;
--green:#00d59b;--green-l:#e0f7ef;--green-d:#006064;
--orange:#E37400;--orange-l:#FEF7E0;--orange-d:#B06000;
--red:#D93025;--red-l:#FCE8E6;--red-d:#A50E0E;
--purple:#7B1FA2;--purple-l:#F3E8FD;--purple-d:#4A148C;
--teal:#00809d;--teal-l:#e0f7fa;--teal-d:#006064;
--shadow-sm:0 1px 3px rgba(0,33,41,.08);--shadow-md:0 2px 8px rgba(0,33,41,.1);
--r:12px;--rs:8px;
--font:'Everett',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:0 16px 60px;-webkit-font-smoothing:antialiased}
.app{max-width:1320px;margin:0 auto}

.app-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 20px;border-bottom:1px solid var(--border-l);margin-bottom:24px;background:url('textura.png') center/cover no-repeat;background-size:100% 200px;background-position:top;position:relative}
.app-header::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,51,66,.85) 0%,rgba(0,51,66,.6) 60%,rgba(240,245,244,1) 100%);pointer-events:none}
.app-header>*{position:relative;z-index:1}
.header-left{display:flex;align-items:center;gap:14px}
.header-left img{height:40px}
.header-left h1{font-weight:500;font-size:1.4rem;color:#fff;letter-spacing:.01em}
.header-right{display:flex;gap:8px;align-items:center}

.top-bar{display:flex;gap:8px;max-width:700px;margin:0 auto 8px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;position:relative;min-width:200px}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text-h)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-h)}
.btn-export{padding:9px 16px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.8rem;font-weight:500;color:var(--text-s);cursor:pointer;transition:background .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.btn-export:hover{background:var(--accent-l);color:var(--accent)}
.btn-export svg{width:14px;height:14px}

.tabs{display:flex;justify-content:center;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border-l)}
.tab{padding:10px 20px;background:none;border:none;font-family:var(--font);font-size:.82rem;font-weight:500;color:var(--text-h);cursor:pointer;position:relative;transition:color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--accent);border-radius:3px 3px 0 0}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:.65rem;font-weight:600;margin-left:5px}
.tab.active .tab-badge{background:var(--accent-l);color:var(--accent)}
.tab:not(.active) .tab-badge{background:var(--border-l);color:var(--text-s)}
.overdue-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:8px;font-size:.6rem;font-weight:600;background:var(--red-l);color:var(--red);margin-left:3px}
.overdue-badge.hidden{display:none}

.board-section{display:none}.board-section.active{display:block}
.new-task-form{max-width:700px;margin:0 auto 12px;background:var(--surface);border-radius:var(--r);padding:16px;border:1px solid var(--border-l)}
.form-row{display:flex;gap:8px;margin-bottom:8px}.form-row:last-child{margin-bottom:0}
.form-row input,.form-row select{flex:1;padding:9px 11px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.82rem;color:var(--text);outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-row input::placeholder{color:var(--text-h)}
.form-row .task-name-input{flex:3}.form-row .priority-select{flex:0 0 110px}
.tags-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tags-row label{font-size:.75rem;color:var(--text-s);font-weight:500;margin-right:2px}
.tag-option{padding:3px 10px;border:1px solid var(--border);border-radius:12px;font-size:.72rem;font-weight:500;cursor:pointer;transition:all .15s;background:var(--surface);color:var(--text-s);user-select:none}
.tag-option.selected{border-color:var(--accent);background:var(--accent-l);color:var(--accent)}
.tag-option:hover{border-color:var(--text-h)}
.btn-add{padding:9px 20px;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;font-family:var(--font);font-weight:500;font-size:.82rem;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-add:hover{background:var(--accent-d)}
.filter-bar{display:flex;align-items:center;gap:8px;max-width:700px;margin:0 auto 14px;flex-wrap:wrap}
.filter-bar label{font-size:.75rem;color:var(--text-s);font-weight:500}
.filter-bar select{padding:5px 9px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.78rem;color:var(--text);outline:none}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
@media(max-width:800px){.board{grid-template-columns:1fr}.form-row{flex-wrap:wrap}.form-row .priority-select{flex:1 1 100%}}
.column{background:var(--surface);border-radius:var(--r);padding:14px;border:1px solid var(--border-l);min-height:160px;transition:box-shadow .2s}
.column.drag-over{box-shadow:var(--shadow-md);border-color:var(--accent)}
.column-header{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border-l)}
.column-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-todo{background:var(--orange)}.dot-progress{background:var(--teal)}.dot-done{background:var(--green)}
.column-header h3{font-weight:500;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-s)}
.column-count{margin-left:auto;font-size:.7rem;font-weight:500;color:var(--text-h);background:var(--bg);min-width:20px;height:20px;padding:0 5px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.task-list{display:flex;flex-direction:column;gap:8px;min-height:28px}
.task-card{padding:11px 13px;border-radius:var(--rs);border:1px solid var(--border-l);background:var(--surface);cursor:grab;transition:transform .15s,box-shadow .15s,opacity .15s}
.task-card:active{cursor:grabbing}.task-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}.task-card.dragging{opacity:.35;transform:scale(.97)}
.task-top-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.priority-badge{font-size:.6rem;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0}
.pri-high{background:var(--red-l);color:var(--red-d)}.pri-med{background:var(--orange-l);color:var(--orange-d)}.pri-low{background:var(--bg);color:var(--text-h)}
.task-title{flex:1;font-size:.85rem;font-weight:500;line-height:1.35;word-break:break-word;color:var(--text);cursor:pointer}
.task-title:hover{color:var(--teal)}
.done-col .task-title{text-decoration:line-through;color:var(--text-h)}
.task-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-card:hover .task-actions{opacity:1}
.task-actions button{width:22px;height:22px;border:none;border-radius:5px;background:transparent;color:var(--text-h);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:background .15s,color .15s}
.task-actions button:hover{background:var(--bg);color:var(--text-s)}
.task-actions button.btn-delete:hover{background:var(--red-l);color:var(--red)}
.task-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.task-tag{font-size:.62rem;font-weight:500;padding:1px 7px;border-radius:8px}
.tag-urgente{background:var(--red-l);color:var(--red-d)}.tag-esperando{background:var(--orange-l);color:var(--orange-d)}.tag-due-diligence{background:var(--purple-l);color:var(--purple-d)}.tag-compliance{background:var(--teal-l);color:var(--teal-d)}.tag-revision{background:var(--accent-l);color:var(--accent)}.tag-cierre{background:var(--green-l);color:var(--green-d)}
.task-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.72rem;color:var(--text-h);line-height:1.3;margin-top:4px}
.task-meta span{display:flex;align-items:center;gap:3px}
.meta-icon{display:inline-block;width:12px;height:12px;flex-shrink:0}
.deadline-overdue{color:var(--red);font-weight:500}
.task-history{margin-top:5px;font-size:.67rem;color:var(--text-h);line-height:1.5}
.task-history-entry{display:flex;align-items:center;gap:3px}
.history-dot{width:3px;height:3px;border-radius:50%;background:var(--border);flex-shrink:0}
.progress-row{display:flex;align-items:center;gap:7px;margin-top:6px}
.progress-bar-bg{flex:1;height:5px;background:var(--border-l);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-bar-fill.low{background:var(--red)}.progress-bar-fill.mid{background:var(--orange)}.progress-bar-fill.high{background:var(--teal)}.progress-bar-fill.full{background:var(--green)}
.progress-select{padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:.68rem;font-family:var(--font);color:var(--text-s);background:var(--surface);cursor:pointer;outline:none}
.card-comment-row{display:flex;gap:5px;margin-top:6px}
.card-comment-row input{flex:1;padding:5px 8px;border:1px solid var(--border-l);border-radius:5px;font-family:var(--font);font-size:.72rem;color:var(--text);outline:none;background:var(--bg)}
.card-comment-row input:focus{border-color:var(--accent);background:var(--surface)}
.card-comment-row button{padding:5px 10px;border:none;border-radius:5px;background:var(--accent);color:#fff;font-family:var(--font);font-size:.68rem;font-weight:500;cursor:pointer}
.transfer-bar{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-l);flex-wrap:wrap;align-items:center}
.transfer-bar span{font-size:.68rem;color:var(--text-h);display:flex;align-items:center;margin-right:2px}
.btn-transfer{padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:var(--surface);font-family:var(--font);font-size:.68rem;font-weight:500;color:var(--accent);cursor:pointer;transition:background .15s}
.btn-transfer:hover{background:var(--accent-l);border-color:var(--accent)}
.btn-finish{padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:var(--surface);font-family:var(--font);font-size:.68rem;font-weight:500;color:var(--red);cursor:pointer;transition:background .15s;margin-left:auto}
.btn-finish:hover{background:var(--red-l);border-color:var(--red)}
.empty-state{text-align:center;padding:20px 10px;color:var(--text-h);font-size:.78rem}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.task-card.new{animation:slideIn .2s ease-out}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,33,41,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:92%;max-width:520px;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,.18);position:relative}
.modal-title{font-size:1.05rem;font-weight:600;margin-bottom:4px;line-height:1.3}
.modal-board{font-size:.72rem;color:var(--text-h);margin-bottom:16px}
.modal-section{margin-bottom:16px}
.modal-section h4{font-size:.75rem;font-weight:500;color:var(--text-s);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.modal-info{display:flex;gap:16px;flex-wrap:wrap;font-size:.82rem;color:var(--text-s)}
.modal-info span{display:flex;align-items:center;gap:4px}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap}
.modal-history{font-size:.78rem;color:var(--text-s);line-height:1.7}
.modal-history-entry{display:flex;align-items:center;gap:5px;padding:3px 0}
.comments-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.comment{background:var(--bg);border-radius:var(--rs);padding:10px 12px}
.comment-header{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-h);margin-bottom:4px}
.comment-text{font-size:.82rem;color:var(--text);line-height:1.5}
.comment-input-row{display:flex;gap:8px}
.comment-input-row input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:var(--font);font-size:.82rem;color:var(--text);outline:none}
.comment-input-row input:focus{border-color:var(--accent)}
.comment-input-row button{padding:9px 16px;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;font-family:var(--font);font-weight:500;font-size:.8rem;cursor:pointer}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;border-radius:50%;background:transparent;font-size:1.1rem;color:var(--text-h);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}
.transfer-form{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.transfer-form label{font-size:.78rem;font-weight:500;color:var(--text-s);margin-bottom:2px;display:block}
.transfer-form select,.transfer-form input,.transfer-form textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:var(--font);font-size:.85rem;color:var(--text);outline:none}
.transfer-form select:focus,.transfer-form input:focus,.transfer-form textarea:focus{border-color:var(--accent)}
.transfer-form textarea{resize:vertical;min-height:60px}
.transfer-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-cancel{padding:9px 18px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.82rem;font-weight:500;color:var(--text-s);cursor:pointer}
.btn-confirm-transfer{padding:9px 18px;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;font-family:var(--font);font-size:.82rem;font-weight:500;cursor:pointer}
.dashboard{display:none;max-width:900px;margin:0 auto}.dashboard.active{display:block}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:700px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r);padding:18px 20px}
.dash-card h3{font-size:.75rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--text-s);margin-bottom:12px}
.dash-stat{display:flex;justify-content:space-between;padding:5px 0;font-size:.82rem;border-bottom:1px solid var(--border-l)}
.dash-stat:last-child{border-bottom:none}
.dash-stat .label{color:var(--text-s)}.dash-stat .value{font-weight:600;color:var(--text)}.dash-stat .value.warn{color:var(--red)}
.dash-people{margin-top:4px}
.dash-person{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-l);font-size:.82rem}
.dash-person:last-child{border-bottom:none}
.dash-person .name{flex:1;font-weight:500;color:var(--text)}.dash-person .count{color:var(--text-s)}.dash-person .overdue-count{color:var(--red);font-weight:500;font-size:.75rem}
.person-bar{flex:0 0 80px;height:6px;background:var(--border-l);border-radius:3px;overflow:hidden}
.person-bar-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .3s}
footer{text-align:center;margin-top:40px;color:var(--text-h);font-size:.72rem}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="header-left">
      <img src="logo.png" alt="Costa Verde">
      <h1>To Do List Inversiones</h1>
    </div>
  </div>

  <div class="top-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14.5" y2="14.5"/></svg>
      <input type="text" id="globalSearch" placeholder="Buscar tareas..." oninput="renderAll()">
    </div>
    <button class="btn-export" onclick="exportExcel()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/><path d="M8 2v9"/><path d="M5 8l3 3 3-3"/></svg>
      Exportar
    </button>
  </div>

  <div class="tabs">
    <button class="tab" onclick="switchTab('dashboard')" id="tab-dashboard">Dashboard</button>
    <button class="tab active" onclick="switchTab('liquidos')" id="tab-liquidos">Activos líquidos<span class="tab-badge" id="badge-liquidos">0</span><span class="overdue-badge hidden" id="overdue-liquidos">0</span></button>
    <button class="tab" onclick="switchTab('alternativos')" id="tab-alternativos">Activos alternativos<span class="tab-badge" id="badge-alternativos">0</span><span class="overdue-badge hidden" id="overdue-alternativos">0</span></button>
    <button class="tab" onclick="switchTab('operaciones')" id="tab-operaciones">Operaciones<span class="tab-badge" id="badge-operaciones">0</span><span class="overdue-badge hidden" id="overdue-operaciones">0</span></button>
  </div>

  <div class="dashboard" id="section-dashboard"></div>

  <div class="board-section active" id="section-liquidos"></div>
  <div class="board-section" id="section-alternativos"></div>
  <div class="board-section" id="section-operaciones"></div>

  <footer>Los datos se guardan en tu navegador &middot; Costa Verde</footer>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="taskModal"></div>
</div>
<div class="modal-overlay" id="transferOverlay" onclick="if(event.target===this)closeTransferModal()">
  <div class="modal" id="transferModal"></div>
</div>

<script>
const STORAGE_KEY='my-todo-tasks-v3';
const BOARDS={liquidos:'Activos líquidos',alternativos:'Activos alternativos',operaciones:'Operaciones'};
const BOARD_PEOPLE={liquidos:['Nico','Raul','Juan Pablo'],alternativos:['Nico','Paul','Ricardo','Juan'],operaciones:['Sebastian','Liss']};
const ALL_TAGS=['Urgente','Esperando respuesta','Due diligence','Compliance','Revisión','Cierre'];
const TAG_CLASSES={Urgente:'tag-urgente','Esperando respuesta':'tag-esperando','Due diligence':'tag-due-diligence',Compliance:'tag-compliance','Revisión':'tag-revision',Cierre:'tag-cierre'};
const STATUS_LABELS={todo:'Por hacer',progress:'En progreso',done:'Hecho'};

let tasks=loadTasks(),draggedId=null,currentTab='liquidos';
let selectedTags={liquidos:[],alternativos:[],operaciones:[]};

function loadTasks(){
  try{
    const old=localStorage.getItem('my-todo-tasks-v2');
    const raw=localStorage.getItem(STORAGE_KEY)||(old||null);
    if(!raw)return[];
    const parsed=JSON.parse(raw);
    const m=parsed.map(t=>({priority:5,assignee:'',deadline:'',board:'liquidos',history:[],comments:[],tags:[],progress:0,...t}));
    if(old&&!localStorage.getItem(STORAGE_KEY)){localStorage.setItem(STORAGE_KEY,JSON.stringify(m));localStorage.removeItem('my-todo-tasks-v2')}
    return m;
  }catch{return[]}
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function buildBoardHTML(board){
  const people=BOARD_PEOPLE[board];
  let pOpts='<option value="">Responsable</option>';
  people.forEach(p=>{pOpts+='<option>'+p+'</option>'});
  let fOpts='<option value="">Todos</option>';
  people.forEach(p=>{fOpts+='<option>'+p+'</option>'});
  return '<div class="new-task-form"><div class="form-row"><input type="text" id="taskInput-'+board+'" class="task-name-input" placeholder="Nueva tarea..."'+
    (board==='liquidos'?' autofocus':'')+'><select id="priorityInput-'+board+'" class="priority-select">'+
    '<option value="1">1-baja</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5-media</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10-urgente</option></select></div>'+
    '<div class="form-row"><select id="assigneeInput-'+board+'">'+pOpts+'</select><input type="date" id="deadlineInput-'+board+'"><button class="btn-add" onclick="addTask(\''+board+'\')">Agregar</button></div>'+
    '<div class="tags-row" id="tags-'+board+'"><label>Tags:</label></div></div>'+
    '<div class="filter-bar"><label>Filtrar:</label><select id="filter-'+board+'" onchange="renderAll()">'+fOpts+'</select><select id="filterTag-'+board+'" onchange="renderAll()"><option value="">Todos los tags</option></select></div>'+
    '<div class="board">'+['todo','progress','done'].map(s=>{
      const dot=s==='todo'?'dot-todo':s==='progress'?'dot-progress':'dot-done';
      const label=STATUS_LABELS[s];
      const doneClass=s==='done'?' done-col':'';
      return '<div class="column'+doneClass+'" data-status="'+s+'" data-board="'+board+'" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"><div class="column-header"><div class="column-dot '+dot+'"></div><h3>'+label+'</h3><div class="column-count" id="count-'+board+'-'+s+'">0</div></div><div class="task-list" id="list-'+board+'-'+s+'"></div></div>';
    }).join('')+'</div>';
}

function initBoards(){
  Object.keys(BOARDS).forEach(b=>{
    document.getElementById('section-'+b).innerHTML=buildBoardHTML(b);
    document.getElementById('taskInput-'+b).addEventListener('keydown',e=>{if(e.key==='Enter')addTask(b)});
  });
}

function initTagSelectors(){
  Object.keys(BOARDS).forEach(board=>{
    const row=document.getElementById('tags-'+board);
    ALL_TAGS.forEach(tag=>{
      const el=document.createElement('span');el.className='tag-option';el.textContent=tag;
      el.onclick=function(){this.classList.toggle('selected');const i=selectedTags[board].indexOf(tag);if(i>-1)selectedTags[board].splice(i,1);else selectedTags[board].push(tag)};
      row.appendChild(el);
    });
    const ft=document.getElementById('filterTag-'+board);
    ALL_TAGS.forEach(tag=>{const o=document.createElement('option');o.value=tag;o.textContent=tag;ft.appendChild(o)});
  });
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.board-section,.dashboard').forEach(s=>s.classList.remove('active'));
  const sec=document.getElementById('section-'+tab);if(sec)sec.classList.add('active');
  if(tab==='dashboard')renderDashboard();
  else{const inp=document.getElementById('taskInput-'+tab);if(inp)inp.focus()}
}

function addTask(board){
  const inp=document.getElementById('taskInput-'+board);const text=inp.value.trim();if(!text)return;
  tasks.push({id:genId(),text,status:'todo',board,priority:parseInt(document.getElementById('priorityInput-'+board).value)||5,
    assignee:document.getElementById('assigneeInput-'+board).value,deadline:document.getElementById('deadlineInput-'+board).value||'',
    tags:[...selectedTags[board]],comments:[],progress:0,createdAt:Date.now(),history:[{action:'Creada',date:Date.now()}]});
  save();renderAll();
  inp.value='';document.getElementById('assigneeInput-'+board).value='';document.getElementById('deadlineInput-'+board).value='';document.getElementById('priorityInput-'+board).value='5';
  selectedTags[board]=[];document.querySelectorAll('#tags-'+board+' .tag-option').forEach(t=>t.classList.remove('selected'));inp.focus();
}

function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);save();renderAll()}

function moveTask(id,newStatus){
  const t=tasks.find(x=>x.id===id);
  if(t){
    if(newStatus==='done'){t.progress=100;t.history.push({action:'Avance: '+(t.progress||0)+'% → 100%',date:Date.now()})}
    t.history.push({action:'Movida a '+STATUS_LABELS[newStatus],date:Date.now()});
    t.status=newStatus;save();renderAll();
  }
}

function openTransferModal(id,newBoard){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const m=document.getElementById('transferModal');
  let pOpts='<option value="">Sin asignar</option>';
  BOARD_PEOPLE[newBoard].forEach(p=>{pOpts+='<option value="'+p+'">'+esc(p)+'</option>'});
  m.innerHTML='<button class="modal-close" onclick="closeTransferModal()">&#10005;</button>'+
    '<div class="modal-title">Transferir tarea</div>'+
    '<div class="modal-board">"'+esc(t.text)+'" &rarr; '+BOARDS[newBoard]+'</div>'+
    '<div class="transfer-form">'+
      '<div><label>Nombre de la tarea</label><input type="text" id="transferName" value="'+esc(t.text).replace(/"/g,'&quot;')+'"></div>'+
      '<div><label>Nuevo responsable</label><select id="transferAssignee">'+pOpts+'</select></div>'+
      '<div><label>Nuevo plazo</label><input type="date" id="transferDeadline"></div>'+
      '<div><label>Comentario (opcional)</label><textarea id="transferComment" placeholder="Contexto para el nuevo equipo..."></textarea></div>'+
      '<div class="transfer-actions"><button class="btn-cancel" onclick="closeTransferModal()">Cancelar</button><button class="btn-confirm-transfer" onclick="confirmTransfer(\''+id+'\',\''+newBoard+'\')">Transferir</button></div>'+
    '</div>';
  document.getElementById('transferOverlay').classList.add('open');
}
function closeTransferModal(){document.getElementById('transferOverlay').classList.remove('open')}

function confirmTransfer(id,newBoard){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const newName=document.getElementById('transferName').value.trim();
  const assignee=document.getElementById('transferAssignee').value;
  const deadline=document.getElementById('transferDeadline').value;
  const comment=document.getElementById('transferComment').value.trim();
  t.history.push({action:'Transferida de '+BOARDS[t.board]+' a '+BOARDS[newBoard],date:Date.now()});
  if(newName&&newName!==t.text){t.history.push({action:'Renombrada: "'+t.text+'" → "'+newName+'"',date:Date.now()});t.text=newName}
  if(comment){if(!t.comments)t.comments=[];t.comments.push({text:comment,date:Date.now(),author:t.assignee||'Sistema'});t.history.push({action:'Comentario de transferencia',date:Date.now()})}
  t.board=newBoard;t.status='todo';t.progress=0;
  if(assignee)t.assignee=assignee;if(deadline)t.deadline=deadline;
  save();closeTransferModal();switchTab(newBoard);renderAll();
}

function addComment(id){
  const inp=document.getElementById('commentInput-'+id);if(!inp)return;const text=inp.value.trim();if(!text)return;
  const t=tasks.find(x=>x.id===id);
  if(t){if(!t.comments)t.comments=[];t.comments.push({text,date:Date.now(),author:t.assignee||'Anónimo'});t.history.push({action:'Comentario agregado',date:Date.now()});save();openModal(id);renderAll()}
}
function addCardComment(id){
  const inp=document.getElementById('cardComment-'+id);if(!inp)return;const text=inp.value.trim();if(!text)return;
  const t=tasks.find(x=>x.id===id);
  if(t){if(!t.comments)t.comments=[];t.comments.push({text,date:Date.now(),author:t.assignee||'Anónimo'});t.history.push({action:'Comentario agregado',date:Date.now()});save();renderAll()}
}
function updateProgress(id,val){
  const t=tasks.find(x=>x.id===id);
  if(t){const old=t.progress||0;t.progress=parseInt(val);if(old!==t.progress)t.history.push({action:'Avance: '+old+'% → '+t.progress+'%',date:Date.now()});save();renderAll()}
}

function getNext(s){return s==='todo'?'progress':s==='progress'?'done':null}
function getPrev(s){return s==='done'?'progress':s==='progress'?'todo':null}
function priClass(p){return p>=8?'pri-high':p>=4?'pri-med':'pri-low'}
function fmtDeadline(ds){if(!ds)return null;const p=ds.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);const today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);const diff=Math.ceil((d-today)/864e5);const f=d.toLocaleDateString('es',{day:'numeric',month:'short'});if(diff<0)return{text:f+' (vencida)',overdue:true};if(diff===0)return{text:'Hoy',overdue:false};if(diff===1)return{text:'Mañana',overdue:false};return{text:f,overdue:false}}
function fmtAgo(ts){const m=Math.floor((Date.now()-ts)/6e4);if(m<1)return'ahora';if(m<60)return'hace '+m+'min';const h=Math.floor(m/60);if(h<24)return'hace '+h+'h';const d=Math.floor(h/24);if(d===1)return'ayer';if(d<30)return'hace '+d+'d';return new Date(ts).toLocaleDateString('es',{day:'numeric',month:'short'})}
function isOverdue(t){if(!t.deadline||t.status==='done')return false;const p=t.deadline.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);const today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);return d<today}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function pIcon(){return'<svg class="meta-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2.5 14.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/></svg>'}
function cIcon(){return'<svg class="meta-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="2" y1="7" x2="14" y2="7"/><line x1="5.5" y1="1" x2="5.5" y2="4"/><line x1="10.5" y1="1" x2="10.5" y2="4"/></svg>'}

function createCard(task){
  const card=document.createElement('div');card.className='task-card';card.draggable=true;card.dataset.id=task.id;card.dataset.board=task.board;
  card.addEventListener('dragstart',e=>{draggedId=task.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');draggedId=null;document.querySelectorAll('.column').forEach(c=>c.classList.remove('drag-over'))});
  const next=getNext(task.status),prev=getPrev(task.status);
  let act='';
  if(prev)act+='<button title="Atrás" onclick="event.stopPropagation();moveTask(\''+task.id+'\',\''+prev+'\')">&#8592;</button>';
  if(next)act+='<button title="Avanzar" onclick="event.stopPropagation();moveTask(\''+task.id+'\',\''+next+'\')">&#8594;</button>';
  if(task.status!=='done')act+='<button class="btn-delete" title="Eliminar" onclick="event.stopPropagation();deleteTask(\''+task.id+'\')">&#10005;</button>';
  let tags='';if(task.tags&&task.tags.length){tags='<div class="task-tags">';task.tags.forEach(tg=>{tags+='<span class="task-tag '+(TAG_CLASSES[tg]||'')+'">'+esc(tg)+'</span>'});tags+='</div>'}
  let meta='';
  if(task.assignee||task.deadline||task.comments&&task.comments.length){
    meta='<div class="task-meta">';
    if(task.assignee)meta+='<span>'+pIcon()+' '+esc(task.assignee)+'</span>';
    if(task.deadline){const dl=fmtDeadline(task.deadline);if(dl){const cls=dl.overdue&&task.status!=='done'?' deadline-overdue':'';meta+='<span class="'+cls+'">'+cIcon()+' '+dl.text+'</span>'}}
    if(task.comments&&task.comments.length)meta+='<span style="cursor:pointer" onclick="event.stopPropagation();openModal(\''+task.id+'\')">&#128172; '+task.comments.length+'</span>';
    meta+='</div>';
  }
  let hist='';if(task.history&&task.history.length>0){const recent=task.history.slice(-2);hist='<div class="task-history">';recent.forEach(h=>{hist+='<div class="task-history-entry"><span class="history-dot"></span> '+h.action+' &middot; '+fmtAgo(h.date)+'</div>'});hist+='</div>'}
  const prog=task.progress||0;const progClass=prog>=100?'full':prog>=60?'high':prog>=30?'mid':'low';
  let progOpts='';for(let i=0;i<=100;i+=10){progOpts+='<option value="'+i+'"'+(i===prog?' selected':'')+'>'+i+'%</option>'}
  let progressHTML='<div class="progress-row"><div class="progress-bar-bg"><div class="progress-bar-fill '+progClass+'" style="width:'+prog+'%"></div></div><select class="progress-select" onchange="event.stopPropagation();updateProgress(\''+task.id+'\',this.value)"'+(task.status==='done'?' disabled':'')+'>'+progOpts+'</select></div>';
  let commentRow='<div class="card-comment-row"><input type="text" id="cardComment-'+task.id+'" placeholder="Agregar comentario..." onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();addCardComment(\''+task.id+'\')}"><button onclick="event.stopPropagation();addCardComment(\''+task.id+'\')">Enviar</button></div>';
  let transfer='';
  if(task.status==='done'){const others=Object.keys(BOARDS).filter(b=>b!==task.board);transfer='<div class="transfer-bar"><span>Transferir a:</span>';others.forEach(b=>{transfer+='<button class="btn-transfer" onclick="event.stopPropagation();openTransferModal(\''+task.id+'\',\''+b+'\')">'+BOARDS[b]+'</button>'});transfer+='<button class="btn-finish" onclick="event.stopPropagation();deleteTask(\''+task.id+'\')">Eliminar</button></div>'}
  card.innerHTML='<div class="task-top-row"><span class="priority-badge '+priClass(task.priority)+'">'+task.priority+'</span><span class="task-title" onclick="event.stopPropagation();openModal(\''+task.id+'\')">'+esc(task.text)+'</span><div class="task-actions">'+act+'</div></div>'+tags+meta+progressHTML+hist+commentRow+transfer;
  return card;
}

function openModal(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;const m=document.getElementById('taskModal');const dl=t.deadline?fmtDeadline(t.deadline):null;
  let cHTML='<div class="comments-list">';if(t.comments&&t.comments.length){t.comments.forEach(c=>{cHTML+='<div class="comment"><div class="comment-header"><span>'+esc(c.author)+'</span><span>'+fmtAgo(c.date)+'</span></div><div class="comment-text">'+esc(c.text)+'</div></div>'})}else{cHTML+='<div style="font-size:.8rem;color:var(--text-h);padding:8px 0">Sin comentarios aún</div>'}cHTML+='</div>';
  let hHTML='<div class="modal-history">';if(t.history){t.history.forEach(h=>{hHTML+='<div class="modal-history-entry"><span class="history-dot"></span> '+h.action+' &middot; '+fmtAgo(h.date)+'</div>'})}hHTML+='</div>';
  let tHTML='';if(t.tags&&t.tags.length){tHTML='<div class="modal-tags">';t.tags.forEach(tg=>{tHTML+='<span class="task-tag '+(TAG_CLASSES[tg]||'')+'">'+esc(tg)+'</span>'});tHTML+='</div>'}
  m.innerHTML='<button class="modal-close" onclick="closeModal()">&#10005;</button><div class="modal-title">'+esc(t.text)+'</div><div class="modal-board">'+BOARDS[t.board]+' &middot; '+STATUS_LABELS[t.status]+' &middot; Avance: '+(t.progress||0)+'%</div>'+
    (tHTML?'<div class="modal-section">'+tHTML+'</div>':'')+
    '<div class="modal-section"><div class="modal-info">'+(t.assignee?'<span>'+pIcon()+' '+esc(t.assignee)+'</span>':'')+'<span>Prioridad: '+t.priority+'</span>'+(dl?'<span class="'+(dl.overdue&&t.status!=='done'?'deadline-overdue':'')+'">'+cIcon()+' '+dl.text+'</span>':'')+'</div></div>'+
    '<div class="modal-section"><h4>Comentarios</h4>'+cHTML+'<div class="comment-input-row"><input type="text" id="commentInput-'+t.id+'" placeholder="Escribe un comentario..." onkeydown="if(event.key===\'Enter\')addComment(\''+t.id+'\')"><button onclick="addComment(\''+t.id+'\')">Enviar</button></div></div>'+
    '<div class="modal-section"><h4>Historial</h4>'+hHTML+'</div>';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>{const ci=document.getElementById('commentInput-'+t.id);if(ci)ci.focus()},100);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}

function renderAll(){
  const search=(document.getElementById('globalSearch').value||'').toLowerCase().trim();
  ['liquidos','alternativos','operaciones'].forEach(board=>{
    let boardTotal=0,overdueCount=0;
    const fp=(document.getElementById('filter-'+board)||{}).value||'';
    const ft=(document.getElementById('filterTag-'+board)||{}).value||'';
    ['todo','progress','done'].forEach(status=>{
      const list=document.getElementById('list-'+board+'-'+status);
      let f=tasks.filter(t=>t.board===board&&t.status===status);
      if(fp)f=f.filter(t=>t.assignee===fp);if(ft)f=f.filter(t=>t.tags&&t.tags.includes(ft));
      if(search)f=f.filter(t=>t.text.toLowerCase().includes(search)||(t.assignee||'').toLowerCase().includes(search));
      if(status!=='done')f=f.slice().sort((a,b)=>b.priority-a.priority);
      boardTotal+=f.length;f.forEach(t=>{if(isOverdue(t))overdueCount++});
      list.innerHTML='';if(!f.length)list.innerHTML='<div class="empty-state">Sin tareas</div>';else f.forEach(t=>list.appendChild(createCard(t)));
      document.getElementById('count-'+board+'-'+status).textContent=f.length;
    });
    document.getElementById('badge-'+board).textContent=boardTotal;
    const ob=document.getElementById('overdue-'+board);if(overdueCount>0){ob.textContent=overdueCount;ob.classList.remove('hidden')}else ob.classList.add('hidden');
  });
}

function renderDashboard(){
  const d=document.getElementById('section-dashboard');let allPeople={};
  Object.keys(BOARD_PEOPLE).forEach(b=>{BOARD_PEOPLE[b].forEach(p=>{if(!allPeople[p])allPeople[p]={total:0,overdue:0,done:0}})});
  let bs={};Object.keys(BOARDS).forEach(b=>{bs[b]={todo:0,progress:0,done:0,overdue:0}});
  tasks.forEach(t=>{if(bs[t.board])bs[t.board][t.status]++;if(isOverdue(t)&&bs[t.board])bs[t.board].overdue++;if(allPeople[t.assignee]){allPeople[t.assignee].total++;if(isOverdue(t))allPeople[t.assignee].overdue++;if(t.status==='done')allPeople[t.assignee].done++}});
  const mx=Math.max(1,...Object.values(allPeople).map(p=>p.total));
  let html='<div class="dash-grid">';
  Object.keys(BOARDS).forEach(b=>{const s=bs[b];const total=s.todo+s.progress+s.done;html+='<div class="dash-card"><h3>'+BOARDS[b]+'</h3><div class="dash-stat"><span class="label">Total</span><span class="value">'+total+'</span></div><div class="dash-stat"><span class="label">Por hacer</span><span class="value">'+s.todo+'</span></div><div class="dash-stat"><span class="label">En progreso</span><span class="value">'+s.progress+'</span></div><div class="dash-stat"><span class="label">Hecho</span><span class="value">'+s.done+'</span></div><div class="dash-stat"><span class="label">Vencidas</span><span class="value'+(s.overdue?' warn':'')+'">'+s.overdue+'</span></div></div>'});
  html+='</div><div class="dash-card"><h3>Carga por persona</h3><div class="dash-people">';
  Object.keys(allPeople).sort((a,b)=>allPeople[b].total-allPeople[a].total).forEach(name=>{const p=allPeople[name];html+='<div class="dash-person"><span class="name">'+esc(name)+'</span><span class="count">'+p.total+' tareas'+(p.done?' ('+p.done+' hechas)':'')+'</span>'+(p.overdue?'<span class="overdue-count">'+p.overdue+' vencidas</span>':'')+'<div class="person-bar"><div class="person-bar-fill" style="width:'+Math.round(p.total/mx*100)+'%"></div></div></div>'});
  html+='</div></div>';d.innerHTML=html;
}

function exportExcel(){
  const sep='\t';
  let tsv='\uFEFF'+'Equipo'+sep+'Tarea'+sep+'Estado'+sep+'Avance'+sep+'Prioridad'+sep+'Responsable'+sep+'Plazo'+sep+'Tags'+sep+'Comentarios\n';
  tasks.forEach(t=>{
    tsv+=BOARDS[t.board]+sep+t.text.replace(/\t/g,' ')+sep+STATUS_LABELS[t.status]+sep+(t.progress||0)+'%'+sep+t.priority+sep+(t.assignee||'')+sep+(t.deadline||'')+sep+(t.tags||[]).join(', ')+sep+(t.comments||[]).map(c=>c.author+': '+c.text).join(' | ').replace(/\t/g,' ')+'\n';
  });
  const blob=new Blob([tsv],{type:'text/tab-separated-values;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='todo-inversiones-'+new Date().toISOString().slice(0,10)+'.xls';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over')}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function onDrop(e){e.preventDefault();const col=e.currentTarget;col.classList.remove('drag-over');const ns=col.dataset.status,cb=col.dataset.board;if(draggedId&&ns){const t=tasks.find(x=>x.id===draggedId);if(t&&t.board===cb)moveTask(draggedId,ns)}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeTransferModal()}});

initBoards();initTagSelectors();renderAll();
</script>
</body>
</html>
