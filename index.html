*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --agua:#003342;--agua90:#314652;--agua70:#5f7079;--agua50:#8b999e;--agua30:#b9c1c5;
  --oscuro:#002129;--oscuro90:#27363d;--oscuro70:#566268;--oscuro50:#869094;--oscuro30:#b6bcbe;
  --celeste:#d2eaff;--celeste70:#e5f0fd;--celeste50:#f3f8fd;
  --medio:#00809d;--medio70:#7fa5b7;--medio50:#c6d6df;
  --verde:#00d59b;--verde70:#a3debf;--verde50:#d6f0e3;
  --bg:#eef4f7;--surface:#ffffff;--text:#002129;--text-s:#566268;--text-h:#869094;
  --border:#b9c1c5;--border-l:#dce2e5;
  --shadow-sm:0 1px 3px rgba(0,33,41,.08);--shadow-md:0 2px 8px rgba(0,33,41,.1);
  --r:12px;--rs:8px;
  --font:'Everett',sans-serif;
}
body{font-family:var(--font);background:var(--celeste50);color:var(--text);min-height:100vh;padding:0 0 60px;-webkit-font-smoothing:antialiased}
.app{max-width:1320px;margin:0 auto;position:relative;padding:24px 16px 0}
.site-header{background:var(--oscuro);padding:20px 24px;margin-bottom:24px;border-radius:0 0 16px 16px}
.header-bar{display:flex;align-items:center;gap:16px;max-width:1320px;margin:0 auto}
.logo{height:28px;opacity:.95}
.header-text{flex:1}
.header-text h1{font-weight:500;font-size:1.3rem;color:#fff;letter-spacing:.02em}
.header-text p{color:var(--celeste);font-size:.78rem;margin-top:1px;opacity:.8}

.top-bar{display:flex;gap:8px;max-width:700px;margin:0 auto 8px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;position:relative;min-width:200px}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.82rem;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--agua)}
.search-wrap input::placeholder{color:var(--text-h)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-h)}
.btn-export{padding:9px 16px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.8rem;font-weight:500;color:var(--text-s);cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.btn-export:hover{background:var(--celeste50);color:var(--agua);border-color:var(--agua50)}
.btn-export svg{width:14px;height:14px}

.tabs{display:flex;justify-content:center;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border-l)}
.tab{padding:10px 20px;background:none;border:none;font-family:var(--font);font-size:.8rem;font-weight:500;color:var(--text-s);cursor:pointer;position:relative;transition:color .2s}
.tab:hover{color:var(--agua)}
.tab.active{color:var(--agua)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--medio);border-radius:3px 3px 0 0}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:.65rem;font-weight:500;margin-left:5px}
.tab.active .tab-badge{background:var(--celeste);color:var(--agua)}
.tab:not(.active) .tab-badge{background:var(--border-l);color:var(--text-s)}
.overdue-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:8px;font-size:.6rem;font-weight:500;background:#fde8e8;color:#c53030;margin-left:3px}
.overdue-badge.hidden{display:none}

.board-section{display:none}.board-section.active{display:block}
.dashboard{display:none}.dashboard.active{display:block;max-width:900px;margin:0 auto}

.new-task-form{max-width:700px;margin:0 auto 12px;background:var(--surface);border-radius:var(--r);padding:16px;border:1px solid var(--border-l)}
.form-row{display:flex;gap:8px;margin-bottom:8px}.form-row:last-child{margin-bottom:0}
.form-row input,.form-row select{flex:1;padding:9px 11px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.8rem;color:var(--text);outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--agua)}
.form-row input::placeholder{color:var(--text-h)}
.form-row .task-name-input{flex:3}.form-row .priority-select{flex:0 0 110px}
.tags-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tags-row label{font-size:.72rem;color:var(--text-s);font-weight:500;margin-right:2px}
.tag-option{padding:3px 10px;border:1px solid var(--border);border-radius:12px;font-size:.7rem;font-weight:500;cursor:pointer;transition:all .15s;background:var(--surface);color:var(--text-s);user-select:none}
.tag-option.selected{border-color:var(--agua);background:var(--celeste);color:var(--agua)}
.tag-option:hover{border-color:var(--agua50)}
.btn-add{padding:9px 20px;border:none;border-radius:var(--rs);background:var(--agua);color:#fff;font-family:var(--font);font-weight:500;font-size:.8rem;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-add:hover{background:var(--oscuro)}

.filter-bar{display:flex;align-items:center;gap:8px;max-width:700px;margin:0 auto 14px;flex-wrap:wrap}
.filter-bar label{font-size:.72rem;color:var(--text-s);font-weight:500}
.filter-bar select{padding:5px 9px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.75rem;color:var(--text);outline:none}

.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
@media(max-width:800px){.board{grid-template-columns:1fr}.form-row{flex-wrap:wrap}.form-row .priority-select{flex:1 1 100%}}
.column{background:var(--surface);border-radius:var(--r);padding:14px;border:1px solid var(--border-l);min-height:160px;transition:box-shadow .2s}
.column.drag-over{box-shadow:var(--shadow-md);border-color:var(--agua)}
.column-header{display:flex;align-items:center;gap:7px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border-l)}
.column-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-todo{background:var(--medio)}.dot-progress{background:var(--agua)}.dot-done{background:var(--verde)}
.column-header h3{font-weight:500;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-s)}
.column-count{margin-left:auto;font-size:.68rem;font-weight:500;color:var(--text-h);background:var(--bg);min-width:20px;height:20px;padding:0 5px;border-radius:10px;display:flex;align-items:center;justify-content:center}

.task-list{display:flex;flex-direction:column;gap:8px;min-height:28px}
.task-card{padding:11px 13px;border-radius:var(--rs);border:1px solid var(--border-l);background:var(--surface);cursor:grab;transition:transform .15s,box-shadow .15s,opacity .15s}
.task-card:active{cursor:grabbing}.task-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}.task-card.dragging{opacity:.35;transform:scale(.97)}
.task-top-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.priority-badge{font-size:.58rem;font-weight:500;padding:2px 6px;border-radius:4px;flex-shrink:0}
.pri-high{background:#fde8e8;color:#c53030}.pri-med{background:var(--celeste50);color:var(--medio)}.pri-low{background:var(--bg);color:var(--text-h)}
.task-title{flex:1;font-size:.82rem;font-weight:400;line-height:1.35;word-break:break-word;color:var(--text);cursor:pointer}
.task-title:hover{color:var(--agua)}
.done-col .task-title{text-decoration:line-through;color:var(--text-h)}
.task-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.task-card:hover .task-actions{opacity:1}
.task-actions button{width:22px;height:22px;border:none;border-radius:5px;background:transparent;color:var(--text-h);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;transition:background .15s,color .15s}
.task-actions button:hover{background:var(--celeste50);color:var(--agua)}
.task-actions button.btn-delete:hover{background:#fde8e8;color:#c53030}

.task-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.task-tag{font-size:.6rem;font-weight:500;padding:1px 7px;border-radius:8px}
.tag-urgente{background:#fde8e8;color:#c53030}
.tag-esperando{background:var(--celeste);color:var(--agua)}
.tag-due-diligence{background:var(--verde50);color:#006644}
.tag-compliance{background:var(--celeste50);color:var(--medio)}
.tag-revision{background:var(--medio50);color:var(--agua)}
.tag-cierre{background:var(--verde50);color:var(--oscuro)}

.task-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:.7rem;color:var(--text-h);line-height:1.3;margin-top:4px}
.task-meta span{display:flex;align-items:center;gap:3px}
.meta-icon{display:inline-block;width:12px;height:12px;flex-shrink:0}
.deadline-overdue{color:#c53030;font-weight:500}

.progress-row{display:flex;align-items:center;gap:7px;margin-top:6px}
.progress-bar-bg{flex:1;height:5px;background:var(--border-l);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-bar-fill.low{background:#c53030}.progress-bar-fill.mid{background:var(--medio)}.progress-bar-fill.high{background:var(--agua)}.progress-bar-fill.full{background:var(--verde)}
.progress-select{padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:.65rem;font-family:var(--font);color:var(--text-s);background:var(--surface);cursor:pointer;outline:none}

.task-history{margin-top:5px;font-size:.65rem;color:var(--text-h);line-height:1.5}
.task-history-entry{display:flex;align-items:center;gap:3px}
.history-dot{width:3px;height:3px;border-radius:50%;background:var(--border);flex-shrink:0}

.card-comment-row{display:flex;gap:5px;margin-top:6px}
.card-comment-row input{flex:1;padding:5px 8px;border:1px solid var(--border-l);border-radius:5px;font-family:var(--font);font-size:.7rem;color:var(--text);outline:none;background:var(--bg)}
.card-comment-row input:focus{border-color:var(--agua);background:var(--surface)}
.card-comment-row button{padding:5px 10px;border:none;border-radius:5px;background:var(--agua);color:#fff;font-family:var(--font);font-size:.65rem;font-weight:500;cursor:pointer}

.transfer-bar{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-l);flex-wrap:wrap;align-items:center}
.transfer-bar span{font-size:.65rem;color:var(--text-h);display:flex;align-items:center;margin-right:2px}
.btn-transfer{padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:var(--surface);font-family:var(--font);font-size:.65rem;font-weight:500;color:var(--agua);cursor:pointer;transition:all .15s}
.btn-transfer:hover{background:var(--celeste);border-color:var(--agua)}
.btn-finish{padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:var(--surface);font-family:var(--font);font-size:.65rem;font-weight:500;color:#c53030;cursor:pointer;transition:all .15s;margin-left:auto}
.btn-finish:hover{background:#fde8e8;border-color:#c53030}

.empty-state{text-align:center;padding:20px 10px;color:var(--text-h);font-size:.75rem}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.task-card.new{animation:slideIn .2s ease-out}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,33,66,.5);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:92%;max-width:520px;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,.18);position:relative}
.modal-title{font-size:1rem;font-weight:500;margin-bottom:4px;line-height:1.3;color:var(--agua)}
.modal-board{font-size:.7rem;color:var(--text-h);margin-bottom:16px}
.modal-section{margin-bottom:16px}
.modal-section h4{font-size:.72rem;font-weight:500;color:var(--text-s);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.modal-info{display:flex;gap:16px;flex-wrap:wrap;font-size:.8rem;color:var(--text-s)}
.modal-info span{display:flex;align-items:center;gap:4px}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap}
.modal-history{font-size:.75rem;color:var(--text-s);line-height:1.7}
.modal-history-entry{display:flex;align-items:center;gap:5px;padding:3px 0}
.comments-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.comment{background:var(--bg);border-radius:var(--rs);padding:10px 12px}
.comment-header{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text-h);margin-bottom:4px}
.comment-text{font-size:.8rem;color:var(--text);line-height:1.5}
.comment-input-row{display:flex;gap:8px}
.comment-input-row input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:var(--font);font-size:.8rem;color:var(--text);outline:none}
.comment-input-row input:focus{border-color:var(--agua)}
.comment-input-row button{padding:9px 16px;border:none;border-radius:var(--rs);background:var(--agua);color:#fff;font-family:var(--font);font-weight:500;font-size:.78rem;cursor:pointer}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;border-radius:50%;background:transparent;font-size:1.1rem;color:var(--text-h);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg)}

.transfer-form{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.transfer-form label{font-size:.75rem;font-weight:500;color:var(--text-s);margin-bottom:2px;display:block}
.transfer-form select,.transfer-form input,.transfer-form textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:var(--font);font-size:.82rem;color:var(--text);outline:none}
.transfer-form select:focus,.transfer-form input:focus,.transfer-form textarea:focus{border-color:var(--agua)}
.transfer-form textarea{resize:vertical;min-height:60px}
.transfer-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-cancel{padding:9px 18px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:var(--font);font-size:.8rem;font-weight:500;color:var(--text-s);cursor:pointer}
.btn-cancel:hover{background:var(--bg)}
.btn-confirm-transfer{padding:9px 18px;border:none;border-radius:var(--rs);background:var(--agua);color:#fff;font-family:var(--font);font-size:.8rem;font-weight:500;cursor:pointer}
.btn-confirm-transfer:hover{background:var(--oscuro)}

.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:700px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r);padding:18px 20px}
.dash-card h3{font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--text-s);margin-bottom:12px}
.dash-stat{display:flex;justify-content:space-between;padding:5px 0;font-size:.8rem;border-bottom:1px solid var(--border-l)}
.dash-stat:last-child{border-bottom:none}
.dash-stat .label{color:var(--text-s)}.dash-stat .value{font-weight:500;color:var(--text)}.dash-stat .value.warn{color:#c53030}
.dash-person{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-l);font-size:.8rem}
.dash-person:last-child{border-bottom:none}
.dash-person .name{flex:1;font-weight:500;color:var(--text)}.dash-person .count{color:var(--text-s)}.dash-person .overdue-count{color:#c53030;font-weight:500;font-size:.72rem}
.person-bar{flex:0 0 80px;height:5px;background:var(--border-l);border-radius:3px;overflow:hidden}
.person-bar-fill{height:100%;background:var(--agua);border-radius:3px;transition:width .3s}

footer{text-align:center;margin-top:40px;color:var(--text-h);font-size:.7rem}
</style>
</head>

async function deleteTask(id){await sb.from('tasks').delete().eq('id',id);tasks=tasks.filter(t=>t.id!==id);renderAll()}

async function openTransferModal(id,nb){const t=tasks.find(x=>x.id===id);if(!t)return;const m=document.getElementById('transferModal');let pOpts='<option value="">Sin asignar</option>'+BP[nb].map(p=>'<option>'+esc(p)+'</option>').join('');m.innerHTML='<button class="modal-close" onclick="closeTransferModal()">&#10005;</button><div class="modal-title">Transferir tarea</div><div class="modal-board">&rarr; '+BOARDS[nb]+'</div><div class="transfer-form"><div><label>Nombre de la tarea</label><input type="text" id="transferName" value="'+esc(t.text)+'"></div><div><label>Nuevo responsable</label><select id="transferAssignee">'+pOpts+'</select></div><div><label>Nuevo plazo</label><input type="date" id="transferDeadline"></div><div><label>Comentario (opcional)</label><textarea id="transferComment" placeholder="Contexto para el nuevo equipo..."></textarea></div><div class="transfer-actions"><button class="btn-cancel" onclick="closeTransferModal()">Cancelar</button><button class="btn-confirm-transfer" onclick="confirmTransfer(\''+id+'\',\''+nb+'\')">Transferir</button></div></div>';document.getElementById('transferOverlay').classList.add('open')}

async function updateProgress(id,val){const t=tasks.find(x=>x.id===id);if(!t)return;const nv=parseInt(val);if(t.status==='done'&&nv<100)return;const old=t.progress||0;t.progress=nv;await saveTask(t);if(old!==nv)await addHist(id,'Avance: '+old+'% \u2192 '+nv+'%');renderAll()}
function getNext(s){return s==='todo'?'progress':s==='progress'?'done':null}
function getPrev(s){return s==='done'?'progress':s==='progress'?'todo':null}
function priClass(p){return p>=8?'pri-high':p>=4?'pri-med':'pri-low'}
function fmtDl(ds){if(!ds)return null;const p=ds.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]),today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);const diff=Math.ceil((d-today)/864e5),f=d.toLocaleDateString('es',{day:'numeric',month:'short'});if(diff<0)return{text:f+' (vencida)',overdue:true};if(diff===0)return{text:'Hoy',overdue:false};if(diff===1)return{text:'Mañana',overdue:false};return{text:f,overdue:false}}
function fmtAgo(ts){const m=Math.floor((Date.now()-ts)/6e4);if(m<1)return'ahora';if(m<60)return'hace '+m+'min';const h=Math.floor(m/60);if(h<24)return'hace '+h+'h';const d=Math.floor(h/24);if(d===1)return'ayer';if(d<30)return'hace '+d+'d';return new Date(ts).toLocaleDateString('es',{day:'numeric',month:'short'})}
function isOD(t){if(!t.deadline||t.status==='done')return false;const p=t.deadline.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]),today=new Date();today.setHours(0,0,0,0);d.setHours(0,0,0,0);return d<today}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function pI(){return'<svg class="meta-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2.5 14.5c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/></svg>'}
function cI(){return'<svg class="meta-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><line x1="2" y1="7" x2="14" y2="7"/><line x1="5.5" y1="1" x2="5.5" y2="4"/><line x1="10.5" y1="1" x2="10.5" y2="4"/></svg>'}

function createCard(t){
  const card=document.createElement('div');card.className='task-card';card.draggable=true;card.dataset.id=t.id;card.dataset.board=t.board;
  card.addEventListener('dragstart',e=>{draggedId=t.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');draggedId=null;document.querySelectorAll('.column').forEach(c=>c.classList.remove('drag-over'))});
  const next=getNext(t.status),prev=getPrev(t.status);
  let act='';
  if(prev)act+='<button title="Atrás" onclick="event.stopPropagation();moveTask(\''+t.id+'\',\''+prev+'\')">&#8592;</button>';
  if(next)act+='<button title="Avanzar" onclick="event.stopPropagation();moveTask(\''+t.id+'\',\''+next+'\')">&#8594;</button>';
  if(t.status!=='done')act+='<button class="btn-delete" title="Eliminar" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">&#10005;</button>';
  let tags='';if(t.tags&&t.tags.length){tags='<div class="task-tags">';t.tags.forEach(tg=>{tags+='<span class="task-tag '+(TC[tg]||'')+'">'+esc(tg)+'</span>'});tags+='</div>'}
  let meta='';
  if(t.assignee||t.deadline||t.comments&&t.comments.length){
    meta='<div class="task-meta">';
    if(t.assignee)meta+='<span>'+pI()+' '+esc(t.assignee)+'</span>';
    if(t.deadline){const dl=fmtDl(t.deadline);if(dl){const cls=dl.overdue&&t.status!=='done'?' deadline-overdue':'';meta+='<span class="'+cls+'">'+cI()+' '+dl.text+'</span>'}}
    if(t.comments&&t.comments.length)meta+='<span style="cursor:pointer" onclick="event.stopPropagation();openModal(\''+t.id+'\')">&#128172; '+t.comments.length+'</span>';
    meta+='</div>';
  }
  const prog=t.progress||0;const pc=prog>=100?'full':prog>=60?'high':prog>=30?'mid':'low';
  let pOpts='';for(let i=0;i<=100;i+=10)pOpts+='<option value="'+i+'"'+(i===prog?' selected':'')+'>'+i+'%</option>';
  const progressHTML='<div class="progress-row"><div class="progress-bar-bg"><div class="progress-bar-fill '+pc+'" style="width:'+prog+'%"></div></div><select class="progress-select" onchange="event.stopPropagation();updateProgress(\''+t.id+'\',this.value)"'+(t.status==='done'?' disabled':'')+'>'+pOpts+'</select></div>';
  let hist='';if(t.history&&t.history.length){const r=t.history.slice(-2);hist='<div class="task-history">';r.forEach(h=>{hist+='<div class="task-history-entry"><span class="history-dot"></span> '+h.action+' &middot; '+fmtAgo(h.date)+'</div>'});hist+='</div>'}
  const commentRow='<div class="card-comment-row"><input type="text" id="cardComment-'+t.id+'" placeholder="Agregar comentario..." onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();addCardComment(\''+t.id+'\')}"><button onclick="event.stopPropagation();addCardComment(\''+t.id+'\')">Enviar</button></div>';
  let transfer='';
  if(t.status==='done'){const others=Object.keys(BOARDS).filter(b=>b!==t.board);transfer='<div class="transfer-bar"><span>Transferir a:</span>';others.forEach(b=>{transfer+='<button class="btn-transfer" onclick="event.stopPropagation();openTransferModal(\''+t.id+'\',\''+b+'\')">'+BOARDS[b]+'</button>'});transfer+='<button class="btn-finish" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">Eliminar</button></div>'}
  card.innerHTML='<div class="task-top-row"><span class="priority-badge '+priClass(t.priority)+'">'+t.priority+'</span><span class="task-title" onclick="event.stopPropagation();openModal(\''+t.id+'\')">'+esc(t.text)+'</span><div class="task-actions">'+act+'</div></div>'+tags+meta+progressHTML+hist+commentRow+transfer;
  return card;
}

function openModal(id){

    '<div class="modal-section"><h4>Comentarios</h4>'+cHTML+'<div class="comment-input-row"><input type="text" id="commentInput-'+t.id+'" placeholder="Escribe un comentario..." onkeydown="if(event.key===\'Enter\')addComment(\''+t.id+'\')"><button onclick="addComment(\''+t.id+'\')">Enviar</button></div></div>'+
    '<div class="modal-section"><h4>Historial</h4>'+hHTML+'</div>';

function renderAll(){
  const search=(document.getElementById('globalSearch').value||'').toLowerCase().trim();
  ['liquidos','alternativos','operaciones'].forEach(b=>{
    let total=0,odCount=0;
    const fP=(document.getElementById('filter-'+b)||{}).value||'';
    const fT=(document.getElementById('filterTag-'+b)||{}).value||'';
    ['todo','progress','done'].forEach(s=>{
      const list=document.getElementById('list-'+b+'-'+s);
      let f=tasks.filter(t=>t.board===b&&t.status===s);
      if(fP)f=f.filter(t=>t.assignee===fP);if(fT)f=f.filter(t=>t.tags&&t.tags.includes(fT));
      if(search)f=f.filter(t=>t.text.toLowerCase().includes(search)||(t.assignee||'').toLowerCase().includes(search));
      if(s!=='done')f=f.slice().sort((a,c)=>c.priority-a.priority);
      total+=f.length;f.forEach(t=>{if(isOD(t))odCount++});
      list.innerHTML='';if(!f.length)list.innerHTML='<div class="empty-state">Sin tareas</div>';
      else f.forEach(t=>list.appendChild(createCard(t)));
      document.getElementById('count-'+b+'-'+s).textContent=f.length;
    });
    document.getElementById('badge-'+b).textContent=total;
    const ob=document.getElementById('overdue-'+b);
    if(odCount>0){ob.textContent=odCount;ob.classList.remove('hidden')}else ob.classList.add('hidden');
  });
}

function renderDashboard(){
  const d=document.getElementById('section-dashboard');
  let allP={};Object.keys(BP).forEach(b=>{BP[b].forEach(p=>{if(!allP[p])allP[p]={total:0,overdue:0,done:0}})});
  let bs={};Object.keys(BOARDS).forEach(b=>{bs[b]={todo:0,progress:0,done:0,overdue:0}});
  tasks.forEach(t=>{if(bs[t.board])bs[t.board][t.status]++;if(isOD(t)&&bs[t.board])bs[t.board].overdue++;if(allP[t.assignee]){allP[t.assignee].total++;if(isOD(t))allP[t.assignee].overdue++;if(t.status==='done')allP[t.assignee].done++}});
  const mx=Math.max(1,...Object.values(allP).map(p=>p.total));
  let h='<div class="dash-grid">';
  Object.keys(BOARDS).forEach(b=>{const s=bs[b],tot=s.todo+s.progress+s.done;h+='<div class="dash-card"><h3>'+BOARDS[b]+'</h3><div class="dash-stat"><span class="label">Total</span><span class="value">'+tot+'</span></div><div class="dash-stat"><span class="label">Por hacer</span><span class="value">'+s.todo+'</span></div><div class="dash-stat"><span class="label">En progreso</span><span class="value">'+s.progress+'</span></div><div class="dash-stat"><span class="label">Hecho</span><span class="value">'+s.done+'</span></div><div class="dash-stat"><span class="label">Vencidas</span><span class="value'+(s.overdue?' warn':'')+'">'+s.overdue+'</span></div></div>'});
  h+='</div><div class="dash-card"><h3>Carga por persona</h3>';
  Object.keys(allP).sort((a,b)=>allP[b].total-allP[a].total).forEach(name=>{const p=allP[name];h+='<div class="dash-person"><span class="name">'+esc(name)+'</span><span class="count">'+p.total+' tareas'+(p.done?' ('+p.done+' hechas)':'')+'</span>'+(p.overdue?'<span class="overdue-count">'+p.overdue+' vencidas</span>':'')+'<div class="person-bar"><div class="person-bar-fill" style="width:'+Math.round(p.total/mx*100)+'%"></div></div></div>'});
  h+='</div>';d.innerHTML=h;
}

function exportExcel(){
  const BOM='\uFEFF';
  const sep='\t';
  let out=BOM+'Equipo'+sep+'Tarea'+sep+'Estado'+sep+'Avance'+sep+'Prioridad'+sep+'Responsable'+sep+'Plazo'+sep+'Tags'+sep+'Comentarios\n';
  tasks.forEach(t=>{
    out+=BOARDS[t.board]+sep+t.text.replace(/\t/g,' ')+sep+SL[t.status]+sep+(t.progress||0)+'%'+sep+t.priority+sep+(t.assignee||'')+sep+(t.deadline||'')+sep+(t.tags||[]).join(', ')+sep+(t.comments||[]).map(c=>c.author+': '+c.text).join(' | ').replace(/\t/g,' ')+'\n';
  });
  const blob=new Blob([out],{type:'text/tab-separated-values;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='todo-inversiones-'+new Date().toISOString().slice(0,10)+'.xls';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over')}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function onDrop(e){e.preventDefault();const col=e.currentTarget;col.classList.remove('drag-over');const ns=col.dataset.status,cb=col.dataset.board;if(draggedId&&ns){const t=tasks.find(x=>x.id===draggedId);if(t&&t.board===cb){moveTask(draggedId,ns)}}}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeTransferModal()}});
init();
</script>
